<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUBE GAME — Leaderboard</title>
    <link rel="icon" type="logo" href="cube_game_logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./leaderboard.css">
</head>
<body>
  <canvas id="lbCanvas"></canvas>

  <div class="lb-wrap">

    <!-- Header -->
    <div class="lb-header">
      <a href="./index.html" class="back-btn">← BACK</a>
      <img src="./cube_game_logo.png" alt="CUBE GAME" class="lb-logo">
      <a href="https://www.youtube.com/@cubegame2026" target="_blank" class="yt-btn">
        <png viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.75 15.5v-7l6.25 3.5-6.25 3.5z"/></png>
      </a>
    </div>

    <!-- Title -->
    <div class="lb-title">
      <span class="lb-trophy">🏆</span>
      <h1>LEADERBOARD</h1>
      <p class="lb-sub">ALL TIME — GLOBAL RANKINGS</p>
    </div>

    <!-- Your rank -->
    <div class="your-rank" id="yourRank"></div>

    <!-- Search -->
    <div class="lb-search-wrap">
      <input type="text" id="lbSearch" placeholder="🔍 Search player..." autocomplete="off">
    </div>

    <!-- Guest block overlay -->
    <div class="guest-block" id="guestBlock" style="display:none">
      <div class="guest-block__icon">🔒</div>
      <h2 class="guest-block__title">Members Only</h2>
      <p class="guest-block__msg">The leaderboard is only available to registered players.</p>
      <a href="./login.html" class="guest-block__btn">SIGN IN / REGISTER</a>
    </div>

    <!-- Table -->
    <div class="lb-table-wrap">
      <div class="lb-table-header">
        <span class="col-rank">RANK</span>
        <span class="col-player">PLAYER</span>
        <span class="col-score">SCORE</span>
        <span class="col-games">GAMES</span>
      </div>
      <div class="lb-list" id="lbList">
        <div class="lb-loading">Loading scores...</div>
      </div>
    </div>

  </div>

  <script src="./transition.js"></script>
<script src="./leaderboard.js"></script>
  <script src="./translate.js"></script>
  <script src="./cookie.js"></script>
</body>
</html>
