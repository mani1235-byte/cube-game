<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUBE GAME — Choose Language</title>
  <link rel="icon" type="logo" href="cube_game_logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./lang.css">
</head>
<body>
  <canvas id="langCanvas"></canvas>
 
  <div class="lang-wrap">
    <div class="logo">
      <img src="cube_game_logo.png" alt="CUBE GAME" class="logo-img">
     </div>
 
    <h2 class="pick-title">CHOOSE YOUR LANGUAGE</h2>
 
    <div class="search-wrap">
      <input type="text" id="langSearch" placeholder="🔍 Search language..." autocomplete="off" spellcheck="false">
    </div>
 
    <div class="lang-grid" id="langGrid"></div>
 
    <button class="confirm-btn" id="confirmBtn" disabled>
      <span id="confirmText">SELECT A LANGUAGE</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
 
    <a class="yt-link" href="https://www.youtube.com/@cubegame2026" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.75 15.5v-7l6.25 3.5-6.25 3.5z"/></svg>
      cubegame
    </a>
  </div>
 
  <script src="./transition.js"></script>
<script src="./lang.js"></script>
<script src="./translate.js"></script>
<script src="./cookie.js"></script>
</body>
</html>
