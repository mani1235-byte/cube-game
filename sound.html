<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUBE GAME — Sound Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./sound.css">
</head>
<body>
  <canvas id="soundCanvas"></canvas>

  <div class="sound-wrap">

    <div class="sound-header">
      <a href="./index.html" class="back-btn">← BACK</a>
      <img src="./cube_game_logo.png" alt="CUBE GAME" class="sound-logo">
      <span></span>
    </div>

    <h1 class="sound-title">🔊 SOUND SETTINGS</h1>

    <div class="sound-card">

      <!-- Music -->
      <div class="sound-section">
        <div class="sound-section-header">
          <span class="sound-section-icon">🎵</span>
          <span class="sound-section-label">BACKGROUND MUSIC</span>
          <label class="toggle">
            <input type="checkbox" id="musicToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="sound-section-body">
          <div class="vol-row">
            <span class="vol-label">Volume</span>
            <input type="range" class="vol-slider" id="musicVol" min="0" max="1" step="0.05">
            <span class="vol-value" id="musicVolVal">40%</span>
          </div>
        </div>
      </div>

      <!-- SFX -->
      <div class="sound-section">
        <div class="sound-section-header">
          <span class="sound-section-icon">💥</span>
          <span class="sound-section-label">SOUND EFFECTS</span>
          <label class="toggle">
            <input type="checkbox" id="sfxToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="sound-section-body">
          <div class="vol-row">
            <span class="vol-label">Volume</span>
            <input type="range" class="vol-slider" id="sfxVol" min="0" max="1" step="0.05">
            <span class="vol-value" id="sfxVolVal">70%</span>
          </div>
          <!-- SFX test buttons -->
          <div class="sfx-grid">
            <button class="sfx-btn" onclick="SOUND.test('slice')">🗡️ Slice</button>
            <button class="sfx-btn" onclick="SOUND.test('bomb')">💣 Bomb</button>
            <button class="sfx-btn" onclick="SOUND.test('heart')">❤️ Heart</button>
            <button class="sfx-btn" onclick="SOUND.test('win')">🏆 Win</button>
            <button class="sfx-btn" onclick="SOUND.test('gameover')">💀 Game Over</button>
            <button class="sfx-btn" onclick="SOUND.test('slowmo')">🐌 Slow-Mo</button>
          </div>
        </div>
      </div>

      <!-- Save button -->
      <button class="save-btn" id="saveBtn">✓ SAVE SETTINGS</button>

    </div>

    <!-- Sound info -->
    <div class="sound-info">
      <p>🎵 Music and sound effects are generated in real-time — no downloads needed!</p>
      <p>Settings are saved to your account automatically.</p>
    </div>

  </div>

  <script src="./transition.js"></script>
  <script src="./sound.js"></script>
  <script src="./translate.js"></script>
  <script src="./cookie.js"></script>
</body>
</html>
